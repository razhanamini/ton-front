name: Deploy Frontend to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Build Docker image
        run: |
          docker build -t ton-frontend:latest \
            --build-arg VITE_API_URL=/api \
            --build-arg VITE_ADMIN_ID=${{ secrets.ADMIN_ID }} \
            --build-arg VITE_TELEGRAM_MODE=true \
            .
      
      - name: Save and compress image
        run: |
          docker save ton-frontend:latest | gzip > ton-frontend.tar.gz
      
      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "ton-frontend.tar.gz,docker-compose.yml"
          target: "/root/frontend/"
      
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Create network if not exists
            docker network create ton-network 2>/dev/null || true
            
            cd /root/frontend/
            docker load < ton-frontend.tar.gz
            docker-compose down || true
            docker-compose up -d
            docker system prune -f
            
            # Cleanup tar file
            rm ton-frontend.tar.gz