version: '3.8'

services:
  backend:
    image: ton-bot:latest  # Use pre-built image from backend repo
    container_name: ton-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - TON_API_KEY=${TON_API_KEY}
      - ADMIN_ID=${ADMIN_ID}
    volumes:
      - ./data:/app/data
    networks:
      - ton-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: ton-frontend:latest  # Use pre-built image from frontend repo
    container_name: ton-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ton-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  ton-network:
    driver: bridge